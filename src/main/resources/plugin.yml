name: ZerithLag
version: 1.1.1
main: me.zerith.zerithlag.ZerithLag
# Quoted so YAML does not strip the trailing zero (1.20 ≠ 1.2)
api-version: "1.20"
description: Plugin antilag para servidores de Minecraft
author: zerinho23

commands:
  zerith:
    description: Comando principal de ZerithLag
    usage: /<command> [reload|clear|tps|entities|info]
    permission: zerithlag.use
    aliases:
      - zl
      - zerithlag
      - antilag

permissions:
  zerithlag.use:
    description: Permite usar /zerith
    default: op
  zerithlag.reload:
    description: Permite recargar la configuración
    default: op
  zerithlag.clear:
    description: Permite limpiar entidades manualmente
    default: op
  zerithlag.stack:
    description: Permite apilar mobs manualmente
    default: op
  zerithlag.tps:
    description: Permite ver el TPS del servidor
    default: op
  zerithlag.entities:
    description: Permite ver el reporte de entidades
    default: op
