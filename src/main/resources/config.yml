# =====================================================
#               ZerithLag Configuration
#          Plugin antilag by zerinho23
# =====================================================
#
# COLORES — dos formatos disponibles, mezclables:
#
#   Códigos &:
#     &0 Negro    &1 Azul osc.  &2 Verde osc.  &3 Cian osc.
#     &4 Rojo     &5 Morado     &6 Dorado       &7 Gris
#     &8 Gris osc &9 Azul       &a Verde        &b Cian
#     &c Rojo cl. &d Rosa       &e Amarillo     &f Blanco
#     &l Negrita  &o Cursiva    &n Subrayado    &m Tachado
#
#   Colores hexadecimales:
#     &#RRGGBB   — cualquier color RGB de 24 bits
#     Ejemplos:  &#FF6600 (naranja)  &#00AAFF (azul cielo)  &#FF0066 (rosa)
#
#   Se pueden mezclar: "&l&#FF6600Texto naranja en negrita&r"
#
# =====================================================

# Prefijo del plugin en los mensajes
prefix: "&8[&6ZerithLag&8] &r"

# ── Limpieza automática ────────────────────────────

auto-clear:

  # ¿Activar la limpieza automática?
  enabled: true

  # Segundos entre cada limpieza automática (mínimo 10)
  interval: 300

  # ¿Enviar mensajes a todos los jugadores?
  broadcast: true

  # true  = mensajes de cuenta regresiva en la barra de acción (sin spam en chat)
  # false = mensajes en el chat
  use-action-bar: true

  # Mundos donde se limpiará ("all" = todos, o escribe el nombre exacto del mundo)
  worlds:
    - all

  # Segundos en los que mostrar el mensaje de la barra de acción
  countdown:
    - 60
    - 30
    - 10
    - 5
    - 4
    - 3
    - 2
    - 1

  # Mensaje de la barra de acción. {time} = segundos restantes
  # Ejemplo con hex: "&#FF6600Limpiando en &l{time}s&#FF6600..."
  countdown-message: "&eLimpiando entidades en &c{time}s&e..."

  # Mensaje al terminar la limpieza. {amount} = entidades eliminadas
  clear-message: "&aEliminadas &e{amount} &aentidades del mundo."

# ── Alertas en el chat ─────────────────────────────
# Siempre se mandan al chat, independientemente del action bar.

chat-alerts:

  # ¿Activar las alertas en el chat?
  enabled: true

  # Mensaje cuando falta exactamente 1 minuto (60 segundos)
  minute-message: "&8[&6ZerithLag&8] &r&7La limpieza de entidades ocurrirá en &61 minuto&7."

  # Mensaje cuando faltan X segundos (los de 'second-alerts'). {time} = segundos.
  seconds-message: "&8[&6ZerithLag&8] &r&7La limpieza de entidades ocurrirá en &e{time} segundos&7."

  # Segundos que activarán el 'seconds-message' (no incluir 60, eso usa minute-message)
  second-alerts:
    - 30

  # Mensaje de cuenta regresiva final. {time} = segundos.
  # Ejemplo con hex: "&#FF4444&lLimpiando en {time}..."
  countdown-message: "&8[&6ZerithLag&8] &r&cLimpiando en &l{time}&c..."

  # Desde cuántos segundos antes iniciar la cuenta regresiva en el chat
  countdown-from: 5

# ── Tipos de entidades ─────────────────────────────

entity-types:

  # ¿Conservar entidades con nombre personalizado?
  keep-named: true

  # ¿Conservar animales domesticados?
  keep-tamed: true

  # Lista de tipos a eliminar (vacío = lista automática inteligente)
  remove: []
  # Ejemplos:
  #  - ITEM
  #  - EXPERIENCE_ORB
  #  - ARROW
  #  - ZOMBIE
  #  - SKELETON
  #  - CREEPER

# ── Mensajes ───────────────────────────────────────

messages:
  reload: "&aConfiguración recargada correctamente."
  clear-command: "&aEliminadas &e{amount} &aentidades manualmente."
  no-permission: "&cNo tienes permiso para usar este comando."
  info: "&6ZerithLag &fv{version} &7por &e{author} &8| &7Total eliminadas: &e{total}"
